name: Security CI/CD Draft

on:
  push:
    branches:
      - main
      - feature/**
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

env:
  JAVA_VERSION: '17'
  APP_URL: http://127.0.0.1:8080
  SONAR_PROJECT_KEY_DEFAULT: sofienefenniche123_Security_web
  SONAR_ORGANIZATION_DEFAULT: sofienefenniche123

jobs:
  build_test:
    name: Build and Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}
          cache: maven

      - name: Compile
        run: ./mvnw -q -DskipTests compile

      - name: Test
        run: ./mvnw -q test

      - name: Upload Test Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-test-report
          path: |
            target/surefire-reports/**
            target/failsafe-reports/**

  sast_sonarcloud:
    name: SAST (SonarCloud)
    runs-on: ubuntu-latest
    needs: build_test
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}
          cache: maven

      - name: Validate Sonar Configuration
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_PROJECT_KEY: ${{ vars.SONAR_PROJECT_KEY }}
          SONAR_ORGANIZATION: ${{ vars.SONAR_ORGANIZATION }}
          SONAR_PROJECT_KEY_DEFAULT: ${{ env.SONAR_PROJECT_KEY_DEFAULT }}
          SONAR_ORGANIZATION_DEFAULT: ${{ env.SONAR_ORGANIZATION_DEFAULT }}
        run: |
          EFFECTIVE_PROJECT_KEY="${SONAR_PROJECT_KEY:-$SONAR_PROJECT_KEY_DEFAULT}"
          EFFECTIVE_ORGANIZATION="${SONAR_ORGANIZATION:-$SONAR_ORGANIZATION_DEFAULT}"
          test -n "$SONAR_TOKEN" || { echo "Missing secret SONAR_TOKEN"; exit 1; }
          test -n "$EFFECTIVE_PROJECT_KEY" || { echo "Missing Sonar project key"; exit 1; }
          test -n "$EFFECTIVE_ORGANIZATION" || { echo "Missing Sonar organization"; exit 1; }
          echo "SONAR_PROJECT_KEY_EFFECTIVE=$EFFECTIVE_PROJECT_KEY" >> "$GITHUB_ENV"
          echo "SONAR_ORGANIZATION_EFFECTIVE=$EFFECTIVE_ORGANIZATION" >> "$GITHUB_ENV"

      - name: Build and Run SonarCloud Analysis
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_PROJECT_KEY_EFFECTIVE: ${{ env.SONAR_PROJECT_KEY_EFFECTIVE }}
          SONAR_ORGANIZATION_EFFECTIVE: ${{ env.SONAR_ORGANIZATION_EFFECTIVE }}
        run: |
          ./mvnw -B -DskipTests verify sonar:sonar \
            -Dsonar.projectKey="${SONAR_PROJECT_KEY_EFFECTIVE}" \
            -Dsonar.organization="${SONAR_ORGANIZATION_EFFECTIVE}" \
            -Dsonar.host.url="https://sonarcloud.io" \
            -Dsonar.token="${SONAR_TOKEN}" \
            -Dsonar.qualitygate.wait=true

      - name: Prepare Sonar Metadata
        if: always()
        env:
          SONAR_PROJECT_KEY_EFFECTIVE: ${{ env.SONAR_PROJECT_KEY_EFFECTIVE }}
        run: |
          mkdir -p reports
          TASK_FILE="$(find . -type f -name report-task.txt | head -n 1 || true)"
          {
            echo "# SonarCloud Report Metadata"
            echo
            if [ -n "${TASK_FILE}" ]; then
              echo "report-task.txt: ${TASK_FILE}"
              echo
              cat "${TASK_FILE}"
              echo
            else
              echo "report-task.txt not found"
              echo
            fi
            echo "dashboard_url=https://sonarcloud.io/dashboard?id=${SONAR_PROJECT_KEY_EFFECTIVE}"
          } > reports/sonar-report.txt

      - name: Upload Sonar Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sonar-report
          path: reports/sonar-report.txt

  dast_zap:
    name: DAST (OWASP ZAP Baseline)
    runs-on: ubuntu-latest
    needs: build_test
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}
          cache: maven

      - name: Start Application
        run: |
          export JWT_SECRET="$(openssl rand -base64 32)"
          export LIBRARIAN_BOOTSTRAP_TOKEN="ci-bootstrap-token"
          nohup ./mvnw -q spring-boot:run > app.log 2>&1 &

      - name: Wait for Application
        run: |
          for i in {1..60}; do
            if curl -sSf "${APP_URL}/v3/api-docs" >/dev/null; then
              echo "Application is ready"
              exit 0
            fi
            sleep 2
          done
          echo "Application did not start in time"
          exit 1

      - name: Run ZAP Baseline Scan
        run: |
          docker run --rm --network host \
            --user 0:0 \
            -e HOME=/zap/wrk \
            -w /zap/wrk \
            -v "${PWD}:/zap/wrk/:rw" \
            ghcr.io/zaproxy/zaproxy:stable \
            zap-baseline.py \
            -t "${APP_URL}" \
            -r zap-report.html \
            -J zap-report.json \
            -w zap-report.md \
            -I \
            -m 2

      - name: Upload ZAP Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: zap-report
          path: |
            zap-report.html
            zap-report.json
            zap-report.md
            app.log

  security_gate:
    name: Security Gate
    runs-on: ubuntu-latest
    needs:
      - build_test
      - sast_sonarcloud
      - dast_zap
    if: always()
    steps:
      - name: Download Build Report
        if: always()
        continue-on-error: true
        uses: actions/download-artifact@v4
        with:
          name: build-test-report
          path: artifacts/build-test

      - name: Download Sonar Report
        if: always()
        continue-on-error: true
        uses: actions/download-artifact@v4
        with:
          name: sonar-report
          path: artifacts/sonar

      - name: Download ZAP Report
        if: always()
        continue-on-error: true
        uses: actions/download-artifact@v4
        with:
          name: zap-report
          path: artifacts/zap

      - name: Build Consolidated Security Summary
        if: always()
        run: |
          mkdir -p reports
          mkdir -p artifacts
          ARTIFACT_LIST="$(find artifacts -maxdepth 3 -type f 2>/dev/null || true)"
          {
            echo "# Security Pipeline Summary"
            echo
            echo "- build_test: ${{ needs.build_test.result }}"
            echo "- sast_sonarcloud: ${{ needs.sast_sonarcloud.result }}"
            echo "- dast_zap: ${{ needs.dast_zap.result }}"
            echo
            echo "## Retrieved Artifacts"
            if [ -n "${ARTIFACT_LIST}" ]; then
              echo "${ARTIFACT_LIST}" | sed 's#^#- #'
            else
              echo "- No artifacts downloaded"
            fi
          } > reports/security-summary.md
          cat reports/security-summary.md >> "$GITHUB_STEP_SUMMARY"

      - name: Evaluate Gate
        run: |
          echo "build_test=${{ needs.build_test.result }}"
          echo "sast_sonarcloud=${{ needs.sast_sonarcloud.result }}"
          echo "dast_zap=${{ needs.dast_zap.result }}"

          if [ "${{ needs.build_test.result }}" != "success" ] || \
             [ "${{ needs.sast_sonarcloud.result }}" != "success" ] || \
             [ "${{ needs.dast_zap.result }}" != "success" ]; then
            echo "Security gate failed"
            exit 1
          fi

          echo "Security gate passed"

      - name: Upload Consolidated Summary
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: security-summary
          path: reports/security-summary.md
