name: SAST Scan

on:
  push:
    branches:
      - main
      - sofyen-fenich/all
  pull_request:

jobs:
  sast:
    name: Run SAST with SonarCloud
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Cache Maven packages
        uses: actions/cache@v3
        with:
          path: ~/.m2
          key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
          restore-keys: ${{ runner.os }}-m2

      - name: Build with Maven
        run: mvn clean install -DskipTests

      - name: Run SonarCloud analysis
        run: mvn sonar:sonar -Dsonar.projectKey=gandhidev1113-glitch_bookwebpage-secure-software-development -Dsonar.organization=DEVKUMAR PARIKSHIT GANDHI -Dsonar.host.url=https://sonarcloud.io -Dsonar.login=${{ secrets.SONAR_TOKEN }}